name: Deploy to GitHub Pages

# Publishes the static repro to GitHub Pages so it can be tested on a phone over HTTPS
# (the Fullscreen API and VirtualKeyboard API require a secure context).

on:
  push:
    branches:
      - master
      - claude/github-pages-test-deploy-x2xss7
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; newer pushes cancel in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        # enablement: true turns Pages on automatically the first time (needs the workflow's
        # pages: write permission). If it fails, enable Pages once in
        # Settings → Pages → Build and deployment → Source: GitHub Actions.
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Stage static site
        run: |
          mkdir -p _site
          cp index.html no-custom-elements.html README.md _site/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
